# Example only — not deployed in P1. See project plan §6.6.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gpu-hardware-xid
  namespace: ai-platform
spec:
  groups:
    - name: gpu-fault
      rules:
        - alert: GPUHardwareXID
          expr: increase(gpu_xid_errors_total[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "GPU XID on {{ $labels.node }}"
            description: "GPU {{ $labels.gpu_id }} reported XID {{ $labels.xid_code }} on node {{ $labels.node }}"
        - alert: OperatorDown
          expr: operator_up == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "AI healing operator is down"
            description: "operator_up has been 0 for 2m; control plane may miss fault handling."
        - alert: HealingStale
          expr: time() - healing_last_success_timestamp > 600
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "No successful healing in 10 minutes"
            description: "Check operator logs and Prometheus fault query."
