# Template for local Docker Prometheus (rendered by start-prometheus.sh via envsubst).
# Defaults: Exporter :9100, Operator :18081 on host (see demo.sh METRICS_LISTEN).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gpu-metrics-exporter
    static_configs:
      - targets: ["${EXPORTER_METRICS_HOST}"]
    metrics_path: /metrics

  - job_name: ai-operator
    static_configs:
      - targets: ["${OPERATOR_METRICS_HOST}"]
    metrics_path: /metrics
    scrape_interval: 15s
