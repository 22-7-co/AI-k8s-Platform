# Scrape the mock GPU exporter on the host.
# Linux + Docker: use host.docker.internal (see start-prometheus.sh --add-host).
# Prometheus in host network mode: change target to localhost:9100.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gpu-metrics-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]
