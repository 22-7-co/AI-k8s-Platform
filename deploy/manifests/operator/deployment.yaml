apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-operator
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-operator
    spec:
      serviceAccountName: ai-operator
      containers:
        - name: operator
          image: ai-k8s-platform/operator:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: operator-config
          env:
            - name: PROMETHEUS_MOCK_NODES
              value: ""  # e2e patches this to the fault node name
            - name: METRICS_LISTEN
              value: ":8080"
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
