apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-metrics-exporter
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: gpu-metrics-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-metrics-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: exporter
          image: ai-k8s-platform/exporter:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: EXPORTER_LISTEN
              value: ":9100"
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
