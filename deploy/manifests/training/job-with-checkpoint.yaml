apiVersion: batch/v1
kind: Job
metadata:
  name: training-job-checkpoint
  namespace: ai-training
  labels:
    app.kubernetes.io/name: training-job-checkpoint
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        ai-k8s-platform.io/training: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              CKPT=/checkpoints/epoch.ckpt
              echo "checkpoint dir:"; ls -la /checkpoints || true
              if [ -f "$CKPT" ]; then
                echo "RESUME: found $CKPT size=$(wc -c < "$CKPT")"
              else
                echo "INIT: creating $CKPT"
                touch "$CKPT"
              fi
              echo running on $(hostname) node=${NODE_NAME:-unknown}
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
