apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-checkpoints
  namespace: ai-training
  labels:
    app.kubernetes.io/name: training-checkpoints
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Cloud: install local-path-provisioner or use cloud disk StorageClass.
  # kind: enable local-path-provisioner or omit storageClassName for default.
